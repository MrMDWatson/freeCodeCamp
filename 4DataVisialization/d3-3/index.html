<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Scatterplot</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script src="http://d3js.org/d3.v5.min.js"></script>
        <link href="style.css" rel="stylesheet">
    </head>
    <body>
        <script>
            const dataset = [
                  [ 34,    78 ],
                  [ 109,   280 ],
                  [ 310,   120 ],
                  [ 79,    411 ],
                  [ 420,   220 ],
                  [ 233,   145 ],
                  [ 333,   96 ],
                  [ 222,   333 ],
                  [ 78,    320 ],
                  [ 21,    123 ]
                ];

            const w = 500;
            const h = 500;

            const svg = d3
                .select("body")
                .append("svg")
                .attr("width", w)
                .attr("height", h)
                .style("background-color", "gray");

            svg.selectAll("circle")
                .data(dataset)
                .enter()
                .append("circle")
                .attr("r", 5)
                .attr("cx", (d, i) => d[0])
                .attr("cy", (d, i) => h - d[1])
                .attr("fill", "red")
                .attr("class", "circle");

            svg.selectAll("text")
                .data(dataset)
                .enter()
                .append("text")
                .attr("x", (d, i) => d[0] + 5)
                .attr("y", (d, i) => h - d[1])
                .text((d) => `${d[0]}, ${d[1]}`)
                .attr("font-size", 10)
                .attr("fill", "navy");

        </script>
    </body>
</html>
